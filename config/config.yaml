# =============================================================
# CIFAR-10 CNN Classifier — Central Configuration
# All hyperparameters are controlled from this single file.
# =============================================================

seed: 42

# ------------------------------------------------------------------
# Dataset
# ------------------------------------------------------------------
data:
  root: "./data/cifar10"
  batch_size: 128
  num_workers: 4
  pin_memory: true
  val_split: 0.1            # 10% of train set used for validation

  # CIFAR-10 channel-wise mean and std (pre-computed)
  mean: [0.4914, 0.4822, 0.4465]
  std:  [0.2470, 0.2435, 0.2616]

  augmentation:
    random_crop_size: 32
    random_crop_padding: 4
    horizontal_flip_prob: 0.5
    color_jitter:
      brightness: 0.2
      contrast:   0.2
      saturation: 0.1
      hue:        0.05

# ------------------------------------------------------------------
# Class Labels
# ------------------------------------------------------------------
classes:
  - airplane
  - automobile
  - bird
  - cat
  - deer
  - dog
  - frog
  - horse
  - ship
  - truck

# ------------------------------------------------------------------
# Model
# ------------------------------------------------------------------
model:
  name: "CIFAR10Net"
  num_classes: 10
  dropout_rate: 0.4

# ------------------------------------------------------------------
# Training
# ------------------------------------------------------------------
training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  early_stopping_patience: 15
  mixed_precision: true        # torch.cuda.amp — ignored on CPU
  log_interval: 10             # print every N batches

  checkpoint_dir: "./checkpoints"
  best_model_name: "best_model.pth"
  last_model_name: "last_model.pth"

  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100
    eta_min: 1.0e-6

# ------------------------------------------------------------------
# Evaluation
# ------------------------------------------------------------------
evaluation:
  checkpoint_path: "./checkpoints/best_model.pth"
  top_k_worst: 5              # number of worst-predicted samples to show

# ------------------------------------------------------------------
# Visualization
# ------------------------------------------------------------------
visualization:
  results_dir: "./results"
  dpi: 150
  figure_format: "png"

  sample_grid:
    samples_per_class: 5      # 5 samples × 10 classes = 5×10 grid

  gradcam:
    target_layer: "block3"    # last residual block (before AvgPool)
    alpha: 0.5                # overlay transparency
